    <!-- Top Header Bar -->
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <span></span><span></span><span></span>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span>Dashboard</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Cari..." id="globalSearch" />
        </div>
        <button class="header-btn notif-btn" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
        <button class="header-btn" title="Mode gelap/terang" id="themeToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Page Content will be injected here -->
    <div class="page-container" id="pageContainer">
      <!-- Pages loaded dynamically -->
    </div>

  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn btn-ghost" id="modalCancel">Batal</button>
        <button class="btn btn-primary" id="modalSave">Simpan</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

  <!-- Bottom Navigation (Mobile Only) -->
  <nav class="bottom-nav" id="bottomNav">
    <div class="bnav-inner">
      <button class="bnav-item active" data-page="dashboard" onclick="navigate('dashboard')">

        <span>Dashboard</span>

      <button class="bnav-item" data-page="lahan" onclick="navigate('lahan')">

      <button class="bnav-item" data-page="laporan" onclick="navigate('laporan')">
        <span class="material-symbols-outlined">analytics</span>
        <span>Laporan</span>
      </button>
      <button class="bnav-item" data-page="profil" onclick="navigate('profil')">
        <span class="material-symbols-outlined">settings</span>
        <span>Settings</span>
      </button>
    </div>
